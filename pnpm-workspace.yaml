packages:
  - './packages/configs/*'
  - './packages/compiler/core'
  - './packages/compiler/cli'
  - './packages/compiler/tooling'
  - './packages/compiler/backends/*'
  - './packages/libraries/*'
  - './packages/nuxt/*'

linkWorkspacePackages: true

catalog:
  # toolchain
  'typescript': ^6.0.3
  'tsup': ^8.5.1
  'rimraf': ^6.1.3
  'prettier': ^3.8.3
  'turbo': ^2.9.8
  'tsx': ^4.21.0

  # node
  '@types/node': ^25.6.0

  # eslint
  'eslint': ^10.3.0
  '@eslint/js': ^10.0.1
  '@stylistic/eslint-plugin': ^5.10.0
  'typescript-eslint': ^8.59.1
  'eslint-plugin-vue': ^10.9.0
  'vue-eslint-parser': ^10.4.0
  'globals': ^17.6.0
  'jiti': ^2.6.1

  # testing
  'vitest': ^4.1.5
  '@vitest/coverage-v8': ^4.1.5
  'playwright': ^1.59.1
  '@playwright/test': ^1.59.1

  # vue / nuxt
  'vue': ^3.5.33
  'vue-tsc': ^3.2.7
  'nuxt': ^4.4.4
  '@nuxt/content': ^3.13.0
  '@nuxt/kit': ^4.4.4
  '@nuxt/schema': ^4.4.4

  # unocss
  'unocss': ^66.6.8
  '@unocss/nuxt': ^66.6.8
  '@unocss/preset-wind4': ^66.6.8
  '@unocss/preset-icons': ^66.6.8
  '@unocss/preset-typography': ^66.6.8
  '@unocss/preset-web-fonts': ^66.6.8
  '@unocss/reset': ^66.6.8

  # iconify (used by preset-icons)
  '@iconify-json/heroicons': ^1.2.3
  '@iconify-json/lucide': ^1.2.105

  # misc
  'defu': ^6.1.7
  'pathe': ^2.0.3
  'ufo': ^1.6.4
  'better-sqlite3': ^12.9.0
