name: merge

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Determine filter base
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint (changed only)
        run: pnpm turbo run lint --filter="...[${{ steps.filter.outputs.ref }}]"

      - name: Typecheck (changed only)
        run: pnpm turbo run typecheck --filter="...[${{ steps.filter.outputs.ref }}]"

      - name: Test (changed only)
        run: pnpm turbo run test --filter="...[${{ steps.filter.outputs.ref }}]"

      - name: Build (changed only)
        run: pnpm turbo run build --filter="...[${{ steps.filter.outputs.ref }}]"
